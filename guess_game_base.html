<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guess Game</title>
    <link rel="stylesheet" href="guess-game.css">
</head>

<body>

<div class="main-container">
    <h2>Guess Game</h2>

    <div style="margin-bottom:10px;">
        Guess a number between 1 - 20, you have 5 chances.
    </div>

    <div class="input">
        <input type="text" id="guess-value" name="guess-value">

        <br>

        <button id="guess-btn">Guess!</button>
        <button id="restart-btn">Restart</button>
    </div>

    <hr>

    <div id="attempt-text">
        Attempt <span id="attempt">0</span>/5
    </div>

    <div id="result"></div>
</div>

<script>
let target = 0;
let attempt = 0;
const maxAttempt = 5;

const guessInput = document.getElementById("guess-value");
const guessBtn = document.getElementById("guess-btn");
const restartBtn = document.getElementById("restart-btn");
const attemptText = document.getElementById("attempt");
const result = document.getElementById("result");

// Initial state
function init() {
    guessInput.value = "";
    result.innerHTML = "";
    attempt = 0;
    attemptText.innerHTML = "0";

    guessBtn.style.display = "none";
    restartBtn.style.display = "inline-block";
}

init();

restartBtn.addEventListener("click", function () {

    target = Math.floor(Math.random() * 20) + 1;

    attempt = 0;
    attemptText.innerHTML = "0";

    guessInput.value = "";
    result.innerHTML = "";

    restartBtn.style.display = "none";
    guessBtn.style.display = "inline-block";

    guessInput.focus();

    console.log("Target:", target); // Remove before submission if you want
});

guessBtn.addEventListener("click", function () {

    let value = guessInput.value.trim();

    if (value === "" || isNaN(value)) {
        return;
    }

    value = Number(value);

    attempt++;
    attemptText.innerHTML = attempt;

    if (value > target) {
        result.innerHTML = value + " is too high";
    }
    else if (value < target) {
        result.innerHTML = value + " is too low";
    }
    else {
        result.innerHTML = "You WIN!";
        guessBtn.style.display = "none";
        restartBtn.style.display = "inline-block";
        return;
    }

    if (attempt >= maxAttempt) {
        result.innerHTML = "You LOSE!";
        guessBtn.style.display = "none";
        restartBtn.style.display = "inline-block";
        return;
    }

    guessInput.value = "";
    guessInput.focus();
});
</script>

</body>
</html>
