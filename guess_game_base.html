<script>
let target = 0;
let attempt = 0;
const maxAttempt = 5;

const guessInput = document.getElementById("guess-value");
const guessBtn = document.getElementById("guess-btn");
const restartBtn = document.getElementById("restart-btn");
const attemptText = document.getElementById("attempt");
const result = document.getElementById("result");

// Initial page
init();

function init() {
    guessInput.value = "";
    result.innerHTML = "";
    attempt = 0;
    attemptText.innerHTML = "0";

    guessBtn.style.display = "none";
    restartBtn.style.display = "inline-block";
}

restartBtn.addEventListener("click", function () {

    target = Math.floor(Math.random() * 20) + 1;
    attempt = 0;

    guessInput.value = "";
    result.innerHTML = "";
    attemptText.innerHTML = "0";

    restartBtn.style.display = "none";
    guessBtn.style.display = "inline-block";

    guessInput.focus();

    console.log(target); // Remove later if desired
});

guessBtn.addEventListener("click", function () {

    let value = guessInput.value.trim();

    // Ignore empty or non-number
    if (value === "" || isNaN(value)) {
        return;
    }

    value = Number(value);

    attempt++;
    attemptText.innerHTML = attempt;

    if (value > target) {
        result.innerHTML = value + " is too high";
    } else if (value < target) {
        result.innerHTML = value + " is too low";
    } else {
        result.innerHTML = "You WIN!";
        guessBtn.style.display = "none";
        restartBtn.style.display = "inline-block";
        return;
    }

    if (attempt >= maxAttempt) {
        result.innerHTML = "You LOSE!";
        guessBtn.style.display = "none";
        restartBtn.style.display = "inline-block";
        return;
    }

    guessInput.value = "";
    guessInput.focus();
});
</script>
